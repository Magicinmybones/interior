<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Section 4 — Explore finishes instantly</title>
<style>
  :root{
    --bg:#16171b;
    --peach:#e7b485;
    --peach-ink:#241608;
    --title:#ffffff;
    --desc:#cfc9bf;
    --panel-ink:#f3ede3;
    --panel-sub:#a7a097;
    --font:"Helvetica Neue",Helvetica,Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    font-family:var(--font);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:4vh 4vw;
    -webkit-font-smoothing:antialiased;
  }

  /* ---- Card : reference ratio 319 / 404 — same as Section 1 ---- */
  .card{
    position:relative;
    width:660px;
    height:836px;
    flex:none;
    border-radius:34px;
    overflow:hidden;
    background:#0e0d0c;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.85);
    isolation:isolate;
    container-type:inline-size;
  }

  /* ---- Full-bleed room render ---- */
  .card__photo{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:50% 32%;
    z-index:0;
  }
  /* warm grade — darkens lower third so footer + swatches read */
  .grade{
    position:absolute;inset:0;z-index:1;pointer-events:none;
    background:
      linear-gradient(to top,
        rgba(14,11,8,.97) 0%,
        rgba(14,11,8,.93) 16%,
        rgba(16,12,9,.72) 30%,
        rgba(16,12,9,.30) 44%,
        rgba(16,12,9,0) 58%),
      linear-gradient(to bottom, rgba(20,15,10,.45) 0%, rgba(20,15,10,0) 16%);
  }

  /* ===== Style Preview glass panel ===== */
  .panel{
    position:absolute;
    z-index:5;
    top:var(--panel-top,4.4%);
    left:var(--panel-left,7.6%);
    width:var(--panel-w,35.5%);
    background:linear-gradient(150deg, rgba(58,52,45,.62), rgba(34,30,26,.52));
    backdrop-filter:blur(22px) saturate(1.1);
    -webkit-backdrop-filter:blur(22px) saturate(1.1);
    border:1px solid rgba(255,255,255,.12);
    border-radius:5cqw;
    box-shadow:0 24px 50px -22px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.10);
    padding:3% 3.4% 2.6%;
    color:var(--panel-ink);
    container-type:inline-size;
  }
  .panel__head{
    display:flex;
    align-items:center;
    gap:3.5%;
    font-weight:600;
    letter-spacing:.2px;
    margin-bottom:6%;
    white-space:nowrap;
  }
  .panel__head svg{width:1.05em;height:1.05em;flex:none;color:#f0e7d8;}
  .panel__row{
    display:flex;
    align-items:center;
    gap:5%;
    padding:5.5% 0;
    border-top:1px solid rgba(255,255,255,.10);
  }
  .panel__row:first-of-type{border-top:0;padding-top:1%;}
  .panel__thumb{
    flex:none;
    width:21%;
    aspect-ratio:1;
    border-radius:3cqw;
    overflow:hidden;
    background:#2a2620;
    box-shadow:0 4px 10px -4px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.10);
  }
  .panel__thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .panel__txt{min-width:0;flex:1;white-space:nowrap;}
  .panel__label{
    color:var(--panel-sub);
    font-weight:500;
    letter-spacing:.2px;
    line-height:1.1;
    margin-bottom:.28em;
  }
  .panel__value{
    color:var(--panel-ink);
    font-weight:600;
    letter-spacing:.1px;
    line-height:1.1;
    display:flex;
    align-items:center;
    gap:5%;
    white-space:nowrap;
  }
  .dots{display:flex;gap:.28em;flex:none;}
  .panel__value--stack{flex-direction:column;align-items:flex-start;gap:.4em;}
  .panel__value--stack .dots{margin-top:.1em;}
  .dots i{width:.55em;height:.55em;border-radius:50%;display:block;box-shadow:inset 0 0 0 1px rgba(0,0,0,.15);}

  /* ===== Material swatch row ===== */
  .swatches{
    position:absolute;
    z-index:4;
    left:50%;
    transform:translateX(-50%);
    width:var(--sw-w,87.2%);
    top:var(--sw-top,60.5%);
  }
  .swatches__row{
    display:flex;
    gap:var(--sw-gap,3.4%);
    align-items:flex-start;
  }
  .swatch{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:.62em;}
  .swatch__tile{
    width:var(--sw-th,15cqw);
    height:var(--sw-th,15cqw);
    max-width:100%;
    border-radius:2.4cqw;
    overflow:hidden;
    background:#2a2620;
    box-shadow:0 8px 18px -8px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.14);
  }
  .swatch__tile img{width:100%;height:100%;object-fit:cover;display:block;}
  .swatch.is-selected .swatch__tile{
    box-shadow:0 0 0 2.5px var(--peach), 0 0 22px -2px rgba(231,180,133,.7), inset 0 0 0 1px rgba(255,255,255,.18);
  }
  .swatch__name{
    color:#d9d3c9;
    font-weight:500;
    letter-spacing:.2px;
    line-height:1;
    white-space:nowrap;
  }
  .swatch.is-selected .swatch__name{color:var(--peach);}

  /* cursor over first swatch */
  .cursor{
    position:absolute;
    z-index:6;
    top:var(--cur-top,64.2%);
    left:var(--cur-left,17.4%);
    width:5.4%;
    filter:drop-shadow(0 3px 5px rgba(0,0,0,.5));
  }

  /* ===== Footer ===== */
  .footer{
    position:absolute;
    z-index:4;
    left:7%;
    right:7%;
    bottom:5.6%;
    color:var(--title);
  }
  .footer__head{
    display:flex;
    align-items:center;
    gap:3.6%;
    margin-bottom:3.4%;
  }
  .footer__icon{
    flex:none;
    width:9.6%;
    aspect-ratio:1;
    background:var(--peach);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--peach-ink);
    box-shadow:0 10px 24px -10px rgba(231,180,133,.6);
  }
  .footer__icon svg{width:52%;height:52%;}
  .footer__title{
    font-weight:700;
    line-height:1.02;
    letter-spacing:-.8px;
    white-space:nowrap;
  }
  .footer__desc{
    color:var(--desc);
    font-weight:500;
    line-height:1.3;
  }

  /* ---- Panel text scales with the PANEL container so it always fits ---- */
  .panel__head{font-size:clamp(14px,10.2cqw,21px);}
  .panel__label{font-size:clamp(11px,6.5cqw,16px);}
  .panel__value{font-size:clamp(12px,7.4cqw,18px);}
  /* ---- Swatch text scales with the card ---- */
  .swatch__name{font-size:clamp(9px,2.5cqw,15px);}
  .footer__title{font-size:clamp(18px,5.6cqw,36px);}
  .footer__desc{font-size:clamp(13px,4.2cqw,27px);}

  /* ---- Embed mode (inside the landing page) ---- */
  html.embed,html.embed body{height:100%;width:100%;overflow:hidden;}
  html.embed body{
    padding:0;
    margin:0;
    background:transparent;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  html.embed .card{
    width:660px;
    height:836px;
    max-width:none;
    border-radius:34px;
    box-shadow:none;
    transform:scale(var(--fit-scale,1));
    transform-origin:center center;
  }
</style>
<script>
(function(){
  var isEmbed = location.search.indexOf('embed') > -1;
  if(isEmbed){
    document.documentElement.classList.add('embed');
    document.documentElement.style.setProperty('--fit-scale', Math.min(window.innerWidth / 660, window.innerHeight / 836));
  }
  function fit(){
    var c=document.querySelector('.card'); if(!c)return;
    var s=isEmbed ? Math.min(window.innerWidth/660, window.innerHeight/836) : Math.min((window.innerWidth-24)/660,(window.innerHeight-24)/836);
    c.style.transform='scale('+s+')';
  }
  function go(){ if(document.body) document.body.style.overflow='hidden'; fit(); }
  window.addEventListener('resize',fit);
  window.addEventListener('DOMContentLoaded',go);
  window.addEventListener('load',go);
  go();
})();
</script>
</head>
<body>
  <div class="card" data-screen-label="Section 04">

    <!-- Full-bleed room render -->
    <img class="card__photo" src="assets/room4.png" alt="Warm organic living room" />
    <div class="grade"></div>

    <!-- Style Preview glass panel -->
    <div class="panel">
      <div class="panel__head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.6 4.6L18 9l-4.4 1.4L12 15l-1.6-4.6L6 9l4.4-1.4z"/><path d="M19 14l.7 2.1L22 17l-2.3.9L19 20l-.7-2.1L16 17l2.3-.9z"/></svg>
        <span>Style Preview</span>
      </div>

      <div class="panel__row">
        <span class="panel__thumb"><img src="https://images.unsplash.com/photo-1558997519-83ea9252edf8?w=200&q=70" alt="" /></span>
        <span class="panel__txt">
          <span class="panel__label">Palette</span>
          <span class="panel__value panel__value--stack">Warm Organic
            <span class="dots"><i style="background:#dcc6a2"></i><i style="background:#caa97c"></i><i style="background:#b8966a"></i><i style="background:#a8623a"></i></span>
          </span>
        </span>
      </div>

      <div class="panel__row">
        <span class="panel__thumb"><img src="https://images.unsplash.com/photo-1604147706283-d7119b5b822c?w=200&q=70" alt="" /></span>
        <span class="panel__txt">
          <span class="panel__label">Wall Finish</span>
          <span class="panel__value">Limestone</span>
        </span>
      </div>

      <div class="panel__row">
        <span class="panel__thumb"><img src="https://images.unsplash.com/photo-1620799140188-3b2a02fd9a77?w=200&q=70" alt="" /></span>
        <span class="panel__txt">
          <span class="panel__label">Sofa Fabric</span>
          <span class="panel__value">Natural Linen</span>
        </span>
      </div>

      <div class="panel__row">
        <span class="panel__thumb"><img src="https://images.unsplash.com/photo-1558997519-83ea9252edf8?w=200&q=70" alt="" /></span>
        <span class="panel__txt">
          <span class="panel__label">Wood Tone</span>
          <span class="panel__value">European Oak</span>
        </span>
      </div>
    </div>

    <!-- Material swatch row -->
    <div class="swatches">
      <div class="swatches__row">
        <div class="swatch is-selected">
          <span class="swatch__tile"><img src="https://images.unsplash.com/photo-1558997519-83ea9252edf8?w=300&q=70" alt="" /></span>
          <span class="swatch__name">Warm Oak</span>
        </div>
        <div class="swatch">
          <span class="swatch__tile"><img src="https://images.unsplash.com/photo-1493106641515-6b5631de4bb9?w=300&q=70" style="object-position:50% 55%" alt="" /></span>
          <span class="swatch__name">Walnut</span>
        </div>
        <div class="swatch">
          <span class="swatch__tile"><img src="https://images.unsplash.com/photo-1620799140188-3b2a02fd9a77?w=300&q=70" alt="" /></span>
          <span class="swatch__name">Natural Linen</span>
        </div>
        <div class="swatch">
          <span class="swatch__tile"><img src="https://images.unsplash.com/photo-1604147706283-d7119b5b822c?w=300&q=70" alt="" /></span>
          <span class="swatch__name">Travertine</span>
        </div>
        <div class="swatch">
          <span class="swatch__tile"><img src="https://images.unsplash.com/photo-1615873968403-89e068629265?w=300&q=70" style="object-position:6% 35%" alt="" /></span>
          <span class="swatch__name">Sage Green</span>
        </div>
      </div>
    </div>

    <!-- Cursor -->
    <svg class="cursor" viewBox="0 0 24 28" fill="none">
      <path d="M3 2 L3 22 L8.4 16.8 L12 26 L15.6 24.5 L11.9 15.6 L19 15 Z" fill="#fff" stroke="rgba(20,16,30,.45)" stroke-width="1.1" stroke-linejoin="round"/>
    </svg>

    <!-- Footer -->
    <div class="footer">
      <div class="footer__head">
        <span class="footer__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/><circle cx="17.5" cy="10.5" r="1.2" fill="currentColor" stroke="none"/><circle cx="8.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/><circle cx="6.5" cy="12.5" r="1.2" fill="currentColor" stroke="none"/><path d="M12 2C6.5 2 2 6 2 11c0 4.4 3.6 8 8 8 1.2 0 2-.9 2-2 0-.5-.2-1-.6-1.4-.3-.4-.5-.8-.5-1.3 0-1.1.9-2 2-2h2.4c3.1 0 5.6-2.5 5.6-5.6C21 5.3 17 2 12 2z"/></svg>
        </span>
        <div class="footer__title">Explore finishes instantly</div>
      </div>
      <p class="footer__desc">Swap materials and compare palettes before deciding.</p>
    </div>
  </div>

  <div id="tweaks-root"></div>

  <script>
    // Single source of truth for tweak values; applied synchronously at parse
    // time (before React/Babel compiles) so the card never flashes its CSS
    // fallbacks before jumping to the saved positions.
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "panelX": 6,
      "panelY": 3.5,
      "panelW": 34,
      "swTop": 57.5,
      "swW": 82.5,
      "swH": 13,
      "swGap": 6.2,
      "curX": 15,
      "curY": 60.5
    }/*EDITMODE-END*/;
    window.__applyTweaks = function(t){
      var c = document.querySelector('.card'); if(!c) return;
      var s = c.style;
      s.setProperty('--panel-left', t.panelX + '%');
      s.setProperty('--panel-top',  t.panelY + '%');
      s.setProperty('--panel-w',    t.panelW + '%');
      s.setProperty('--sw-top',     t.swTop + '%');
      s.setProperty('--sw-w',       t.swW + '%');
      s.setProperty('--sw-th',      t.swH + 'cqw');
      s.setProperty('--sw-gap',     t.swGap + '%');
      s.setProperty('--cur-left',   t.curX + '%');
      s.setProperty('--cur-top',    t.curY + '%');
    };
    window.__applyTweaks(window.TWEAK_DEFAULTS);
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">
    const TWEAK_DEFAULTS = window.TWEAK_DEFAULTS;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => { window.__applyTweaks(t); }, [t]);

      return (
        <TweaksPanel>
          <TweakSection label="Style Preview panel" />
          <TweakSlider label="X position" value={t.panelX} min={0} max={50} step={0.5} unit="%"
                       onChange={(v) => setTweak('panelX', v)} />
          <TweakSlider label="Y position" value={t.panelY} min={0} max={40} step={0.5} unit="%"
                       onChange={(v) => setTweak('panelY', v)} />
          <TweakSlider label="Width" value={t.panelW} min={22} max={48} step={0.5} unit="%"
                       onChange={(v) => setTweak('panelW', v)} />

          <TweakSection label="Swatch row" />
          <TweakSlider label="Top position" value={t.swTop} min={45} max={72} step={0.5} unit="%"
                       onChange={(v) => setTweak('swTop', v)} />
          <TweakSlider label="Row width" value={t.swW} min={50} max={96} step={0.5} unit="%"
                       onChange={(v) => setTweak('swW', v)} />
          <TweakSlider label="Tile height" value={t.swH} min={8} max={26} step={0.5}
                       onChange={(v) => setTweak('swH', v)} />
          <TweakSlider label="Gap" value={t.swGap} min={0} max={10} step={0.2} unit="%"
                       onChange={(v) => setTweak('swGap', v)} />

          <TweakSection label="Cursor" />
          <TweakSlider label="X position" value={t.curX} min={0} max={90} step={0.5} unit="%"
                       onChange={(v) => setTweak('curX', v)} />
          <TweakSlider label="Y position" value={t.curY} min={45} max={80} step={0.5} unit="%"
                       onChange={(v) => setTweak('curY', v)} />
        </TweaksPanel>
      );
    }

    ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Design your next room — Landing</title>
<style>
  :root{
    --bg:#fbfaf8;
    --ink:#16140f;
    --muted:#6f6a60;
    --font:"Helvetica Neue",Helvetica,Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;}
  body{
    background:var(--bg);
    font-family:var(--font);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow:hidden;
    display:flex;
    justify-content:center;
    transition:background-color .25s ease,color .25s ease;
  }
  body.is-night{
    --bg:#080808;
    --ink:#ffffff;
    --muted:#c7c2b7;
  }

  .wrap{
    max-width:1760px;
    margin:0 auto;
    padding:clamp(20px,3.2vw,44px) clamp(16px,2.4vw,40px) clamp(56px,7vw,100px);
    transform-origin:top center;
    position:relative;
  }

  .theme-toggle{
    position:absolute;
    top:0;
    right:0;
    display:flex;
    align-items:center;
    gap:10px;
    color:var(--ink);
    font-size:12px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
  }
  .theme-toggle__switch{
    position:relative;
    width:58px;
    height:32px;
    border:0;
    border-radius:999px;
    background:#ded8ce;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);
    cursor:pointer;
    transition:background-color .25s ease, box-shadow .25s ease;
  }
  .theme-toggle__switch::after{
    content:"";
    position:absolute;
    top:4px;
    left:4px;
    width:24px;
    height:24px;
    border-radius:50%;
    background:#fffdf9;
    box-shadow:0 3px 8px rgba(0,0,0,.16);
    transition:transform .25s ease, background-color .25s ease;
  }
  body.is-night .theme-toggle__switch{
    background:#2a2a2a;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);
  }
  body.is-night .theme-toggle__switch::after{
    transform:translateX(26px);
    background:#ffffff;
  }

  /* ---- Heading block ---- */
  .head{
    text-align:center;
    max-width:880px;
    margin:0 auto clamp(40px,5vw,72px);
  }
  .head h1{
    font-weight:700;
    letter-spacing:-0.018em;
    line-height:1.04;
    font-size:clamp(24px,3.8vw,48px);
  }
  .head p{
    margin:clamp(18px,2vw,28px) auto 0;
    max-width:560px;
    color:var(--muted);
    font-weight:500;
    line-height:1.5;
    font-size:clamp(12px,1.05vw,15px);
    text-wrap:pretty;
  }

  /* ---- Card row ---- */
  .cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:clamp(12px,1.2vw,20px);
    align-items:stretch;
  }
  .card-frame{
    aspect-ratio:319 / 404;       /* preserved exactly from each section */
    border-radius:clamp(18px,1.7vw,28px);
    overflow:hidden;
    background:#0e0d0c;
    box-shadow:0 36px 70px -34px rgba(28,18,8,.42), 0 4px 14px -8px rgba(0,0,0,.18);
  }
  .card-frame iframe{
    width:100%;
    height:100%;
    border:0;
    display:block;
    border-radius:inherit;
  }

  @media (max-width:920px){
    .cards{grid-template-columns:repeat(2,1fr);gap:clamp(16px,3vw,24px);}
  }
  @media (max-width:540px){
    .cards{grid-template-columns:1fr;max-width:380px;margin:0 auto;}
    .theme-toggle{
      position:static;
      justify-content:flex-end;
      margin-bottom:18px;
    }
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="theme-toggle">
      <span>Night</span>
      <button class="theme-toggle__switch" id="themeToggle" type="button" aria-label="Toggle night mode" aria-pressed="false"></button>
    </div>
    <header class="head">
      <h1>Design your next room,<br/>live, with your studio.</h1>
      <p>From the first sketch to the final finish, the whole design<br/>process stays connected on one shared canvas.</p>
    </header>

    <section class="cards">
      <div class="card-frame" data-screen-label="Card 01">
        <iframe src="Section 1.html?embed=1" title="Design the room together"></iframe>
      </div>
      <div class="card-frame" data-screen-label="Card 02">
        <iframe src="Section 2.html?embed=1" title="Build the room in real time"></iframe>
      </div>
      <div class="card-frame" data-screen-label="Card 03">
        <iframe src="Section 3.html?embed=1" title="Plan with real-world scale"></iframe>
      </div>
      <div class="card-frame" data-screen-label="Card 04">
        <iframe src="Section 4.html?embed=1" title="Explore finishes instantly"></iframe>
      </div>
    </section>
  </main>
  <script>
    (function(){
      var body = document.body;
      var toggle = document.getElementById('themeToggle');
      var firstFrame = document.querySelector('iframe[src*="Section 1.html"]');

      function setNightMode(isNight){
        body.classList.toggle('is-night', isNight);
        if(toggle) toggle.setAttribute('aria-pressed', String(isNight));
        if(firstFrame){
          var src = new URL(firstFrame.getAttribute('src'), window.location.href);
          if(isNight) src.searchParams.set('theme', 'night');
          else src.searchParams.delete('theme');
          firstFrame.setAttribute('src', src.pathname.split('/').pop() + src.search);
        }
        fitLanding();
      }

      function fitLanding(){
        var wrap = document.querySelector('.wrap');
        if(!wrap) return;
        wrap.style.transform = 'none';
        var width = wrap.offsetWidth;
        var height = wrap.offsetHeight;
        if(!width || !height) return;
        var scale = Math.min(window.innerWidth / width, window.innerHeight / height, 1);
        wrap.style.transform = 'scale(' + scale + ')';
      }
      if(toggle){
        toggle.addEventListener('click', function(){
          setNightMode(!body.classList.contains('is-night'));
        });
      }
      window.addEventListener('resize', fitLanding);
      window.addEventListener('load', fitLanding);
      window.addEventListener('DOMContentLoaded', fitLanding);
      fitLanding();
    })();
  </script>
</body>
</html>

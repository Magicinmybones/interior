<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Section 1 — Design the room together</title>
<style>
  :root{
    --bg:#0b0a0c;
    --note:#efe8da;
    --note-ink:#211d18;
    --note-line:#cfc6b4;
    --bubble:#e7b485;
    --bubble-ink:#2a1808;
    --jake:#9789f5;
    --peach:#e7b485;
    --title:#ffffff;
    --desc:#d7d2c9;
    --font:"Helvetica Neue",Helvetica,Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    font-family:var(--font);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:4vh 4vw;
    -webkit-font-smoothing:antialiased;
  }

  /* ---- Card : reference ratio 319 / 404 (≈ 4:5) ---- */
  .card{
    position:relative;
    width:660px;
    height:836px;
    flex:none;
    border-radius:30px;
    overflow:hidden;
    background:#1a1714;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.8);
    isolation:isolate;
  }
  .card__photo{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:50% 42%;
    z-index:0;
  }
  /* warm grade + readability gradients */
  .card__grade{
    position:absolute;inset:0;z-index:1;
    background:
      linear-gradient(to top, rgba(8,6,4,.94) 0%, rgba(8,6,4,.72) 14%, rgba(8,6,4,.18) 30%, rgba(8,6,4,0) 46%),
      linear-gradient(to bottom, rgba(40,28,14,.30) 0%, rgba(40,28,14,0) 22%);
    pointer-events:none;
  }

  /* ---- Sticky note ---- */
  .note{
    position:absolute;
    z-index:4;
    top:var(--note-top,3.6%);
    left:var(--note-left,5%);
    width:var(--note-w,38%);
    height:var(--note-h,auto);
    background:var(--note);
    color:var(--note-ink);
    border-radius:12px;
    padding:4.4% 5.2%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    transform:rotate(-1.2deg);
    box-shadow:0 18px 34px -16px rgba(0,0,0,.55);
  }
  .note__tape{
    position:absolute;
    top:-7px;left:-10px;
    width:52px;height:24px;
    background:linear-gradient(135deg,rgba(255,255,255,.72),rgba(255,255,255,.34));
    transform:rotate(-43deg);
    border-radius:3px;
    box-shadow:0 2px 6px rgba(0,0,0,.12);
  }
  .note__head{
    display:flex;
    align-items:center;
    gap:7px;
    font-weight:600;
    letter-spacing:.1px;
    white-space:nowrap;
  }
  .note__head svg{width:1em;height:1em;flex:none;}
  .note__rule{
    height:1px;
    background:var(--note-line);
    margin:5% 0 5%;
    border:0;
  }
  .note__body{
    font-weight:500;
    line-height:1.32;
    color:#2c2620;
  }

  /* ---- Chat bubble ---- */
  .bubble{
    position:absolute;
    z-index:4;
    top:var(--bubble-top,22%);
    left:var(--bubble-left,27%);
    width:var(--bubble-w,50%);
    height:var(--bubble-h,auto);
    background:var(--bubble);
    color:var(--bubble-ink);
    font-weight:700;
    line-height:1.24;
    border-radius:18px;
    padding:3.4% 6%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    box-shadow:0 16px 30px -14px rgba(0,0,0,.5);
  }
  .bubble::after{
    content:"";
    position:absolute;
    left:14%;
    bottom:-9px;
    width:24px;height:24px;
    background:var(--bubble);
    border-radius:0 0 6px 0;
    transform:rotate(45deg);
  }

  /* ---- Cursor + name tag ---- */
  .cursor{
    position:absolute;
    z-index:5;
    top:45.5%;
    left:45%;
    width:7%;
    filter:drop-shadow(0 3px 5px rgba(0,0,0,.4));
  }
  .nametag{
    position:absolute;
    z-index:5;
    top:49%;
    left:51%;
    background:var(--jake);
    color:#fff;
    font-weight:700;
    padding:.5em 1em;
    border-radius:999px;
    font-size:clamp(13px,2.6cqw,19px);
    box-shadow:0 10px 22px -10px rgba(74,58,180,.7);
  }

  /* ---- Footer ---- */
  .footer{
    position:absolute;
    z-index:4;
    left:6.2%;
    right:6.2%;
    bottom:5.4%;
    color:var(--title);
  }
  .footer__head{
    display:flex;
    align-items:center;
    gap:3%;
    margin-bottom:3.2%;
  }
  .footer__icon{
    flex:none;
    width:9.6%;
    aspect-ratio:1;
    background:var(--peach);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#241608;
  }
  .footer__icon svg{width:52%;height:52%;}
  .footer__title{
    font-weight:700;
    line-height:1.05;
    letter-spacing:-.6px;
    white-space:nowrap;
  }
  .footer__desc{
    color:var(--desc);
    font-weight:500;
    line-height:1.28;
    max-width:100%;
  }

  /* ---- Type scale tied to card width via container query ---- */
  .card{container-type:inline-size;}
  .note__head{font-size:clamp(12px,3.2cqw,20px);}
  .note__body{font-size:clamp(12px,3.2cqw,20px);}
  .bubble{font-size:clamp(12px,3.4cqw,22px);}
  .footer__title{font-size:clamp(18px,5.6cqw,36px);}
  .footer__desc{font-size:clamp(13px,4.2cqw,27px);}

  /* ---- Embed mode (inside the landing page) ---- */
  html.embed,html.embed body{height:100%;width:100%;overflow:hidden;}
  html.embed body{
    padding:0;
    margin:0;
    background:transparent;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  html.embed .card{
    width:660px;
    height:836px;
    max-width:none;
    border-radius:30px;
    box-shadow:none;
    transform:scale(var(--fit-scale,1));
    transform-origin:center center;
  }
</style>
<script>
(function(){
  var isEmbed = location.search.indexOf('embed') > -1;
  var isNight = location.search.indexOf('theme=night') > -1;
  if(isEmbed){
    document.documentElement.classList.add('embed');
    document.documentElement.style.setProperty('--fit-scale', Math.min(window.innerWidth / 660, window.innerHeight / 836));
  }
  function fit(){
    var c=document.querySelector('.card'); if(!c)return;
    var s=isEmbed ? Math.min(window.innerWidth/660, window.innerHeight/836) : Math.min((window.innerWidth-24)/660,(window.innerHeight-24)/836);
    c.style.transform='scale('+s+')';
  }
  function applyTheme(){
    var img = document.querySelector('.card__photo');
    if(img) img.src = isNight ? 'assets/room_night.png' : 'assets/room.png';
  }
  function go(){ if(document.body) document.body.style.overflow='hidden'; applyTheme(); fit(); }
  window.addEventListener('resize',fit);
  window.addEventListener('DOMContentLoaded',go);
  window.addEventListener('load',go);
  go();
})();
</script>
</head>
<body>
  <div class="card" data-screen-label="Section 01">
    <img class="card__photo" src="assets/room.png" alt="Living room interior" />
    <div class="card__grade"></div>

    <!-- Sticky note -->
    <div class="note">
      <span class="note__tape"></span>
      <div class="note__head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>
        <span>Layout Review</span>
      </div>
      <hr class="note__rule" />
      <div class="note__body">Move sofa 18&rdquo; left<br/>for better flow.</div>
    </div>

    <!-- Collaborator chat bubble -->
    <div class="bubble">Float the sofa toward the window?</div>

    <!-- Cursor -->
    <svg class="cursor" viewBox="0 0 24 28" fill="none">
      <path d="M3 2 L3 22 L8.4 16.8 L12 26 L15.6 24.5 L11.9 15.6 L19 15 Z" fill="#fff" stroke="rgba(20,16,30,.45)" stroke-width="1.1" stroke-linejoin="round"/>
    </svg>

    <!-- Name tag -->
    <div class="nametag">Jake</div>

    <!-- Footer -->
    <div class="footer">
      <div class="footer__head">
        <span class="footer__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </span>
        <div class="footer__title">Design the room together</div>
      </div>
      <p class="footer__desc">Pin ideas and nudge furniture with your studio on the same live canvas.</p>
    </div>
  </div>

  <div id="tweaks-root"></div>

  <script>
    // Single source of truth for tweak values; applied synchronously at parse
    // time (before React/Babel) so the card never flashes its CSS fallbacks.
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "noteX": 7,
      "noteY": 4,
      "noteW": 34.5,
      "noteH": 18,
      "bubbleX": 27.5,
      "bubbleY": 29,
      "bubbleW": 54.5,
      "bubbleH": 11.5
    }/*EDITMODE-END*/;
    window.__applyTweaks = function(t){
      var c = document.querySelector('.card'); if(!c) return;
      var s = c.style;
      s.setProperty('--note-left',  t.noteX + '%');
      s.setProperty('--note-top',   t.noteY + '%');
      s.setProperty('--note-w',     t.noteW + '%');
      s.setProperty('--note-h',     t.noteH > 0 ? t.noteH + '%' : 'auto');
      s.setProperty('--bubble-left', t.bubbleX + '%');
      s.setProperty('--bubble-top',  t.bubbleY + '%');
      s.setProperty('--bubble-w',    t.bubbleW + '%');
      s.setProperty('--bubble-h',    t.bubbleH > 0 ? t.bubbleH + '%' : 'auto');
    };
    window.__applyTweaks(window.TWEAK_DEFAULTS);
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">
    const TWEAK_DEFAULTS = window.TWEAK_DEFAULTS;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => { window.__applyTweaks(t); }, [t]);

      return (
        <TweaksPanel>
          <TweakSection label="Sticky note" />
          <TweakSlider label="X position" value={t.noteX} min={0} max={70} step={0.5} unit="%"
                       onChange={(v) => setTweak('noteX', v)} />
          <TweakSlider label="Y position" value={t.noteY} min={0} max={80} step={0.5} unit="%"
                       onChange={(v) => setTweak('noteY', v)} />
          <TweakSlider label="Width" value={t.noteW} min={15} max={80} step={0.5} unit="%"
                       onChange={(v) => setTweak('noteW', v)} />
          <TweakSlider label="Height" value={t.noteH} min={0} max={60} step={0.5} unit="%"
                       onChange={(v) => setTweak('noteH', v)} />

          <TweakSection label="Chat bubble" />
          <TweakSlider label="X position" value={t.bubbleX} min={0} max={70} step={0.5} unit="%"
                       onChange={(v) => setTweak('bubbleX', v)} />
          <TweakSlider label="Y position" value={t.bubbleY} min={0} max={80} step={0.5} unit="%"
                       onChange={(v) => setTweak('bubbleY', v)} />
          <TweakSlider label="Width" value={t.bubbleW} min={15} max={85} step={0.5} unit="%"
                       onChange={(v) => setTweak('bubbleW', v)} />
          <TweakSlider label="Height" value={t.bubbleH} min={0} max={60} step={0.5} unit="%"
                       onChange={(v) => setTweak('bubbleH', v)} />
        </TweaksPanel>
      );
    }

    ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<App />);
  </script>
</body>
</html>
